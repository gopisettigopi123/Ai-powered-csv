services:
  - type: web
    name: ai-crm-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set this in the Render dashboard!
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard!
    healthCheckPath: /api/health
